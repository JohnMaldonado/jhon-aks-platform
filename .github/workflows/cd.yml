name: CD — Deploy to AKS

on:
  workflow_run:
    workflows: ["CI — Build and Scan"]
    types: [completed]
    branches: [main]

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var-file="../terraform/environments/dev/terraform.tfvars"

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      # ─── ACR imagePullSecret ──────────────────────────────────────────────────
      # En vez de role assignment (requiere permisos que no tenemos),
      # creamos un token de ACR y lo guardamos como Secret en K8s
      - name: Create ACR imagePullSecret in production namespace
        run: |
          # Habilitar admin temporalmente para obtener credenciales
          az acr update --name jhonacrdev --admin-enabled true

          ACR_USER=$(az acr credential show --name jhonacrdev --query username -o tsv)
          ACR_PASS=$(az acr credential show --name jhonacrdev --query passwords[0].value -o tsv)

          kubectl create namespace production --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret docker-registry acr-secret \
            --namespace production \
            --docker-server=${{ secrets.ACR_LOGIN_SERVER }} \
            --docker-username=$ACR_USER \
            --docker-password=$ACR_PASS \
            --dry-run=client -o yaml | kubectl apply -f -

      # ─── Helm repos ──────────────────────────────────────────────────────────
      - name: Setup Helm repos
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo add jetstack https://charts.jetstack.io
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

      # ─── Namespaces ──────────────────────────────────────────────────────────
      - name: Create namespaces
        run: |
          for ns in production staging monitoring ingress-nginx cert-manager; do
            kubectl create namespace $ns --dry-run=client -o yaml | kubectl apply -f -
          done

      # ─── ingress-nginx ───────────────────────────────────────────────────────
      - name: Install or upgrade ingress-nginx
        run: |
          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
            --namespace ingress-nginx \
            --wait --timeout 8m0s \
            --set controller.replicaCount=2 \
            --set controller.tolerations[0].key=workload \
            --set controller.tolerations[0].operator=Equal \
            --set controller.tolerations[0].value=user \
            --set controller.tolerations[0].effect=NoSchedule \
            --set controller.admissionWebhooks.patch.tolerations[0].key=workload \
            --set controller.admissionWebhooks.patch.tolerations[0].operator=Equal \
            --set controller.admissionWebhooks.patch.tolerations[0].value=user \
            --set controller.admissionWebhooks.patch.tolerations[0].effect=NoSchedule \
            --set controller.resources.requests.cpu=100m \
            --set controller.resources.requests.memory=128Mi \
            --set controller.resources.limits.cpu=500m \
            --set controller.resources.limits.memory=512Mi \
            --set controller.service.annotations."service\.beta\.kubernetes\.io/azure-load-balancer-health-probe-request-path"=/healthz/ready

      # ─── cert-manager ────────────────────────────────────────────────────────
      - name: Install or upgrade cert-manager
        run: |
          helm upgrade --install cert-manager jetstack/cert-manager \
            --namespace cert-manager \
            --wait --timeout 8m0s \
            --set installCRDs=true \
            --set tolerations[0].key=workload \
            --set tolerations[0].operator=Equal \
            --set tolerations[0].value=user \
            --set tolerations[0].effect=NoSchedule \
            --set webhook.tolerations[0].key=workload \
            --set webhook.tolerations[0].operator=Equal \
            --set webhook.tolerations[0].value=user \
            --set webhook.tolerations[0].effect=NoSchedule \
            --set cainjector.tolerations[0].key=workload \
            --set cainjector.tolerations[0].operator=Equal \
            --set cainjector.tolerations[0].value=user \
            --set cainjector.tolerations[0].effect=NoSchedule \
            --set startupapicheck.tolerations[0].key=workload \
            --set startupapicheck.tolerations[0].operator=Equal \
            --set startupapicheck.tolerations[0].value=user \
            --set startupapicheck.tolerations[0].effect=NoSchedule

      # ─── monitoring ──────────────────────────────────────────────────────────
      - name: Install or upgrade monitoring
        run: |
          helm upgrade --install monitoring prometheus-community/kube-prometheus-stack \
            --namespace monitoring \
            --wait --timeout 10m0s \
            -f kubernetes/helm/monitoring-values.yaml

      # ─── Build y push imagen ─────────────────────────────────────────────────
      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Login to ACR
        run: az acr login --name jhonacrdev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image (amd64)
        uses: docker/build-push-action@v5
        with:
          context: ./app/api
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/api:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ env.ACR_LOGIN_SERVER }}/api:latest

      # ─── Deploy ──────────────────────────────────────────────────────────────
      - name: Update image tag in manifest
        run: |
          sed -i "s|${{ env.ACR_LOGIN_SERVER }}/api:.*|${{ env.ACR_LOGIN_SERVER }}/api:${{ steps.tag.outputs.IMAGE_TAG }}|g" \
            kubernetes/base/api.yaml

      - name: Save previous revision for rollback
        id: revision
        run: |
          PREV=$(kubectl get deployment api -n production \
            -o jsonpath='{.metadata.annotations.deployment\.kubernetes\.io/revision}' 2>/dev/null || echo "0")
          echo "PREV_REVISION=$PREV" >> $GITHUB_OUTPUT

      - name: Apply manifests
        run: kubectl apply -f kubernetes/base/

      - name: Wait for rollout
        id: rollout
        run: kubectl rollout status deployment/api -n production --timeout=5m
        continue-on-error: true

      - name: Rollback on rollout failure
        if: steps.rollout.outcome == 'failure'
        run: |
          echo "Rollout failed — rolling back"
          kubectl rollout undo deployment/api -n production || true
          echo "ROLLBACK_TRIGGERED=true" >> $GITHUB_ENV

      - name: Smoke test
        id: smoke
        if: steps.rollout.outcome == 'success'
        run: |
          sleep 30
          INGRESS_IP=$(kubectl get ingress api-ingress -n production \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          curl -f http://$INGRESS_IP/health/live || exit 1
          curl -f http://$INGRESS_IP/api/items || exit 1
          echo "Smoke test passed"
        continue-on-error: true

      - name: Deploy to staging
        if: steps.smoke.outcome == 'success'
        run: |
          kubectl create secret docker-registry acr-secret \
            --namespace staging \
            --docker-server=${{ env.ACR_LOGIN_SERVER }} \
            --docker-username=$(az acr credential show --name jhonacrdev --query username -o tsv) \
            --docker-password=$(az acr credential show --name jhonacrdev --query passwords[0].value -o tsv) \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f kubernetes/base/postgres-secret-staging.yaml
          kubectl apply -f kubernetes/base/api-staging.yaml
          kubectl rollout status deployment/api -n staging --timeout=3m
          echo "## Staging deploy" >> $GITHUB_STEP_SUMMARY
          echo "✅ Staging updated with `api:${{ steps.tag.outputs.IMAGE_TAG }}`" >> $GITHUB_STEP_SUMMARY

      - name: Rollback on smoke test failure
        if: steps.smoke.outcome == 'failure' && steps.rollout.outcome == 'success'
        run: |
          echo "Smoke test failed — rolling back"
          kubectl rollout undo deployment/api -n production || true
          echo "ROLLBACK_TRIGGERED=true" >> $GITHUB_ENV

      - name: Summary
        if: always()
        run: |
          if [ "${ROLLBACK_TRIGGERED}" = "true" ]; then
            echo "## ❌ Deploy failed — rolled back" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ✅ Deploy successful" >> $GITHUB_STEP_SUMMARY
            echo "Deployed: \`${{ env.ACR_LOGIN_SERVER }}/api:${{ steps.tag.outputs.IMAGE_TAG }}\`" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail if rollback was triggered
        if: env.ROLLBACK_TRIGGERED == 'true'
        run: exit 1
