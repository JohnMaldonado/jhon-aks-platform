name: Deploy to Production (Manual Approval)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. 806a3c2)"
        required: true
      confirm:
        description: "Type DEPLOY to confirm production deployment"
        required: true

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'DEPLOY' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Update image tag in manifest
        run: |
          sed -i "s|${{ env.ACR_LOGIN_SERVER }}/api:.*|${{ env.ACR_LOGIN_SERVER }}/api:${{ github.event.inputs.image_tag }}|g" \
            kubernetes/base/api.yaml

      - name: Save previous revision for rollback
        run: |
          PREV=$(kubectl get deployment api -n production \
            -o jsonpath='{.metadata.annotations.deployment\.kubernetes\.io/revision}' 2>/dev/null || echo "0")
          echo "PREV_REVISION=$PREV" >> $GITHUB_ENV

      - name: Apply manifests to production
        run: kubectl apply -f kubernetes/base/

      - name: Wait for rollout
        id: rollout
        run: kubectl rollout status deployment/api -n production --timeout=5m
        continue-on-error: true

      - name: Rollback on rollout failure
        if: steps.rollout.outcome == 'failure'
        run: |
          kubectl rollout undo deployment/api -n production || true
          echo "ROLLBACK_TRIGGERED=true" >> $GITHUB_ENV

      - name: Production smoke test
        id: smoke
        if: steps.rollout.outcome == 'success'
        run: |
          sleep 30
          INGRESS_IP=$(kubectl get ingress api-ingress -n production \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          curl -f http://$INGRESS_IP/health/live || exit 1
          curl -f http://$INGRESS_IP/api/items || exit 1
          echo "Production smoke test passed"
        continue-on-error: true

      - name: Rollback on smoke test failure
        if: steps.smoke.outcome == 'failure' && steps.rollout.outcome == 'success'
        run: |
          kubectl rollout undo deployment/api -n production || true
          echo "ROLLBACK_TRIGGERED=true" >> $GITHUB_ENV

      - name: Summary
        if: always()
        run: |
          if [ "${ROLLBACK_TRIGGERED}" = "true" ]; then
            echo "## ❌ Production deploy failed — rolled back" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ✅ Production deploy successful" >> $GITHUB_STEP_SUMMARY
            echo "Deployed: \`${{ env.ACR_LOGIN_SERVER }}/api:${{ github.event.inputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail if rollback was triggered
        if: env.ROLLBACK_TRIGGERED == 'true'
        run: exit 1
