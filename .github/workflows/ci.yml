name: CI — Build and Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  terraform-lint:
    name: Terraform Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.50.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init (for lint)
        working-directory: terraform
        run: terraform init -backend=false

      - name: TFLint Init
        working-directory: terraform
        run: tflint --init

      - name: Run TFLint
        working-directory: terraform
        run: tflint --recursive

  ansible-check:
    name: Ansible Dry Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          pip install ansible kubernetes
          ansible-galaxy collection install kubernetes.core

      - name: Ansible syntax check
        run: |
          ansible-playbook ansible/playbooks/bootstrap.yml \
            -i ansible/inventory/aks.yml \
            --syntax-check

  build-and-scan:
    name: Build and Scan
    runs-on: ubuntu-latest
    needs: [terraform-lint, ansible-check]

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      # Cache de las capas de Docker — si el Dockerfile o package.json
      # no cambiaron, reutiliza las capas del build anterior
      # Resultado: builds pasan de ~2min a ~30seg cuando solo cambia el código
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('app/api/package.json', 'app/api/Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (amd64) with cache
        uses: docker/build-push-action@v5
        with:
          context: ./app/api
          platforms: linux/amd64
          push: false
          load: true
          tags: api:${{ steps.tag.outputs.IMAGE_TAG }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # Evita que el cache crezca indefinidamente
      - name: Rotate cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: api:${{ steps.tag.outputs.IMAGE_TAG }}
          format: table
          exit-code: 1
          severity: CRITICAL

      - name: Summary
        run: |
          echo "## CI Result" >> $GITHUB_STEP_SUMMARY
          echo "✅ tflint passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ ansible syntax-check passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Image built and scanned: \`api:${{ steps.tag.outputs.IMAGE_TAG }}\`" >> $GITHUB_STEP_SUMMARY
