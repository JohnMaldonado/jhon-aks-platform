name: Destroy Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DESTROY to confirm"
        required: true

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'DESTROY' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing 2>/dev/null || echo "Cluster not found — skipping"

      # ─── Paso 1: eliminar PDBs que bloquean el drain ──────────────────────────
      - name: Delete PDBs to allow node drain
        run: |
          kubectl delete pdb --all -n ingress-nginx 2>/dev/null || true
          kubectl delete pdb --all -n cert-manager 2>/dev/null || true
          kubectl delete pdb --all -n production 2>/dev/null || true
          kubectl delete pdb --all -n monitoring 2>/dev/null || true
          echo "PDBs deleted"

      # ─── Paso 2: escalar ingress-nginx a 0 para liberar el node pool ──────────
      - name: Scale down ingress-nginx
        run: |
          kubectl scale deployment ingress-nginx-controller \
            -n ingress-nginx --replicas=0 2>/dev/null || true
          echo "ingress-nginx scaled down"

      # ─── Paso 3: eliminar el node pool ────────────────────────────────────────
      - name: Delete user node pool
        run: |
          az aks nodepool delete \
            --cluster-name ${{ secrets.AKS_CLUSTER_NAME }} \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name user 2>/dev/null || echo "Node pool not found — skipping"

      # ─── Paso 4: Terraform destroy ────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}"

      - name: Terraform Destroy
        working-directory: terraform
        run: |
          terraform destroy -auto-approve \
            -var-file="../terraform/environments/dev/terraform.tfvars"

      - name: Summary
        run: |
          echo "## ✅ Destroy Complete" >> $GITHUB_STEP_SUMMARY
          echo "All infrastructure destroyed cleanly." >> $GITHUB_STEP_SUMMARY
