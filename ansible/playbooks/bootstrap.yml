---
- name: Bootstrap AKS cluster
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    cluster_name: "jhon-aks-dev"
    resource_group: "jhon-aks-rg-dev"
    namespaces:
      - name: production
        env: prod
      - name: staging
        env: staging
      - name: monitoring
        env: ops
      - name: ingress-nginx
        env: ops

  tasks:

    - name: Get AKS credentials
      ansible.builtin.command: >
        az aks get-credentials
        --resource-group {{ resource_group }}
        --name {{ cluster_name }}
        --overwrite-existing
      changed_when: true

    - name: Create namespaces
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ item.name }}"
            labels:
              environment: "{{ item.env }}"
              managed-by: ansible
      loop: "{{ namespaces }}"

    - name: Apply LimitRange to production namespace
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: LimitRange
          metadata:
            name: default-limits
            namespace: production
          spec:
            limits:
              - type: Container
                default:
                  memory: "256Mi"
                  cpu: "200m"
                defaultRequest:
                  memory: "128Mi"
                  cpu: "100m"
                max:
                  memory: "2Gi"
                  cpu: "2000m"

    - name: Add ingress-nginx Helm repo
      kubernetes.core.helm_repository:
        name: ingress-nginx
        repo_url: https://kubernetes.github.io/ingress-nginx

    - name: Install ingress-nginx
      kubernetes.core.helm:
        name: ingress-nginx
        chart_ref: ingress-nginx/ingress-nginx
        release_namespace: ingress-nginx
        create_namespace: false
        wait: true
        timeout: 5m0s
        values:
          controller:
            replicaCount: 2
            # FIX: tolerar el taint del user pool para poder schedulear ahí
            tolerations:
              - key: "workload"
                operator: "Equal"
                value: "user"
                effect: "NoSchedule"
            service:
              annotations:
                service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: /healthz
            resources:
              requests:
                cpu: "100m"
                memory: "128Mi"
              limits:
                cpu: "500m"
                memory: "512Mi"

    - name: Add cert-manager Helm repo
      kubernetes.core.helm_repository:
        name: jetstack
        repo_url: https://charts.jetstack.io

    - name: Install cert-manager
      kubernetes.core.helm:
        name: cert-manager
        chart_ref: jetstack/cert-manager
        release_namespace: cert-manager
        create_namespace: true
        wait: true
        timeout: 5m0s
        values:
          installCRDs: true
          # FIX: cert-manager también necesita tolerar el taint
          tolerations:
            - key: "workload"
              operator: "Equal"
              value: "user"
              effect: "NoSchedule"
          webhook:
            tolerations:
              - key: "workload"
                operator: "Equal"
                value: "user"
                effect: "NoSchedule"
          cainjector:
            tolerations:
              - key: "workload"
                operator: "Equal"
                value: "user"
                effect: "NoSchedule"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

    - name: Verify namespaces created
      ansible.builtin.command: kubectl get namespaces
      register: ns_output
      changed_when: false

    - name: Show namespaces
      ansible.builtin.debug:
        msg: "{{ ns_output.stdout_lines }}"
